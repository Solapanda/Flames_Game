<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAMES Card — Customize & Download</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand',sans-serif;background:#0e0e0e;color:#e8e0d4;min-height:100vh}
.top{padding:.8rem 1rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
.top h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#d4a853}
.top p{font-size:.62rem;color:#807060;font-weight:300;margin-top:.1rem}
.main{max-width:620px;margin:0 auto;padding:1rem}
.rbar{display:flex;gap:.25rem;justify-content:center;margin-bottom:.8rem;flex-wrap:wrap}
.rb{padding:.35rem .6rem;border:1.5px solid rgba(255,255,255,.08);border-radius:8px;background:transparent;color:#a09080;font-family:'Quicksand',sans-serif;font-size:.62rem;font-weight:500;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:.25rem}
.rb:hover{border-color:rgba(255,255,255,.2)}.rb.on{border-color:#d4a853;background:rgba(212,168,83,.08);color:#d4a853}
.pv{background:#1a1a1a;border-radius:10px;padding:.5rem;margin-bottom:.8rem;border:1px solid rgba(255,255,255,.04)}
canvas{display:block;margin:0 auto;border-radius:5px;max-width:100%;height:auto}
.nr{display:flex;gap:.4rem;margin-bottom:.7rem}
.nr input{flex:1;padding:.45rem .65rem;border:1.5px solid rgba(255,255,255,.08);border-radius:7px;background:rgba(255,255,255,.03);color:#e8e0d4;font-family:'Quicksand',sans-serif;font-size:.78rem;outline:none;transition:border-color .2s}
.nr input:focus{border-color:#d4a853}.nr input::placeholder{color:#605040}
.ctrl{background:#1a1a1a;border-radius:10px;padding:.8rem;border:1px solid rgba(255,255,255,.04);margin-bottom:.8rem}
.ct2{font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;color:#e8e0d4;margin-bottom:.5rem}
.cl2{font-size:.55rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#807060;margin-bottom:.3rem;margin-top:.5rem}
.cl2:first-of-type{margin-top:0}
.prs{display:flex;gap:.3rem;flex-wrap:wrap}
.pr{width:34px;height:34px;border-radius:7px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pr:hover{transform:scale(1.08)}.pr.on{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.12)}
.prh{position:absolute;left:0;width:50%;height:100%}.prh:last-child{left:50%}
.crow{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.4rem}
.cpk{display:flex;align-items:center;gap:.25rem}
.cpk label{font-size:.55rem;color:#a09080}
.cpk input[type="color"]{width:30px;height:26px;border:1px solid rgba(255,255,255,.1);border-radius:5px;background:transparent;cursor:pointer;padding:1px}
.cpk input[type="color"]::-webkit-color-swatch-wrapper{padding:2px}
.cpk input[type="color"]::-webkit-color-swatch{border:none;border-radius:3px}
.abtn{padding:.35rem .8rem;border:1.5px solid rgba(255,255,255,.1);border-radius:50px;background:transparent;font-family:'Quicksand',sans-serif;font-size:.62rem;font-weight:500;cursor:pointer;transition:all .25s;color:#d4a853;margin-top:.4rem}
.abtn:hover{background:rgba(212,168,83,.08);border-color:#d4a853}
.acts{display:flex;gap:.35rem;justify-content:center;flex-wrap:wrap}
.dl1{padding:.45rem 1.1rem;border:1.5px solid #d4a853;border-radius:50px;background:transparent;color:#d4a853;font-family:'Quicksand',sans-serif;font-size:.68rem;font-weight:600;cursor:pointer;transition:all .25s}
.dl1:hover{background:rgba(212,168,83,.1)}
.dl2{padding:.45rem 1rem;border:1.5px solid rgba(255,255,255,.08);border-radius:50px;background:transparent;color:#a09080;font-family:'Quicksand',sans-serif;font-size:.65rem;font-weight:500;cursor:pointer;transition:all .25s}
.dl2:hover{border-color:#a09080}
@media(max-width:480px){.main{padding:.7rem}.rb{padding:.28rem .45rem;font-size:.56rem}}
</style>
</head>
<body>
<div class="top"><h1>FLAMES Card Customizer</h1><p>Choose result · pick colors · download your card</p></div>
<div class="main">
  <div class="nr">
    <input type="text" id="name1" placeholder="Your name" value="Alex">
    <input type="text" id="name2" placeholder="Their name" value="Jordan">
  </div>
  <div class="rbar" id="rBar">
    <button class="rb" data-r="F" onclick="pick('F')"><span style="font-size:.85rem">🤝</span>Friends</button>
    <button class="rb" data-r="L" onclick="pick('L')"><span style="font-size:.85rem">💕</span>Lovers</button>
    <button class="rb" data-r="A" onclick="pick('A')"><span style="font-size:.85rem">🥰</span>Affection</button>
    <button class="rb on" data-r="M" onclick="pick('M')"><span style="font-size:.85rem">💍</span>Marriage</button>
    <button class="rb" data-r="E" onclick="pick('E')"><span style="font-size:.85rem">⚡</span>Tension</button>
    <button class="rb" data-r="S" onclick="pick('S')"><span style="font-size:.85rem">👫</span>BFFs</button>
  </div>
  <div class="pv"><canvas id="card" width="1080" height="720"></canvas></div>
  <div class="ctrl">
    <div class="ct2">Color Scheme</div>
    <div class="cl2">Presets</div>
    <div class="prs" id="presets"></div>
    <div class="cl2">Custom Colors</div>
    <div class="crow">
      <div class="cpk"><label>Background</label><input type="color" id="cBg" value="#0c0a04"></div>
      <div class="cpk"><label>Accent</label><input type="color" id="cAcc" value="#d4a853"></div>
      <div class="cpk"><label>Text</label><input type="color" id="cTxt" value="#e8e0d4"></div>
      <button class="abtn" onclick="applyCustom()">Apply</button>
    </div>
  </div>
  <div class="acts">
    <button class="dl1" onclick="download()">📸 Download Card</button>
    <button class="dl2" onclick="download('jpg')">↓ JPG</button>
  </div>
</div>

<script>
const W=1080,H=720,SITE='flames.football-panda.workers.dev';

const RES={
  F:{word:'Friends',emoji:'🤝',header:'A BOND WRITTEN IN THE STARS',tag:'"Some bonds are the quiet kind — steady, sure, and infinite"',nj:'♥'},
  L:{word:'Lovers',emoji:'💕',header:'THE HEART KNOWS WHAT IT WANTS',tag:'"Sparks this bright don\'t come around twice"',nj:'♥'},
  A:{word:'Affection',emoji:'🥰',header:'SOFTLY, BUT CERTAINLY',tag:'"The gentlest connections leave the deepest marks"',nj:'♥'},
  M:{word:'Marriage',emoji:'💍',header:'DESTINY HAS SPOKEN',tag:'"The letters didn\'t whisper this one — they announced it"',nj:'♥'},
  E:{word:'Tension',emoji:'⚡',header:'SOMETHING ELECTRIC THIS WAY COMES',tag:'"The best stories start with a little friction"',nj:'⚡'},
  S:{word:'BFFs',emoji:'👫',header:'CHOSEN FAMILY, COSMIC BOND',tag:'"The universe gave you something louder than love"',nj:'♥'}
};

const PRE={
  _u:[{n:'Classic Gold',bg:'#0c0a04',a:'#d4a853',t:'#ede5d8'},{n:'Midnight Rose',bg:'#0e0610',a:'#ff6b8a',t:'#f5e8f0'},{n:'Deep Ocean',bg:'#040810',a:'#4a9eff',t:'#dce8f5'},{n:'Emerald',bg:'#040e08',a:'#4acd8a',t:'#d8f0e4'}],
  F:[{n:'Warm Amber',bg:'#0c0a06',a:'#c8aa64',t:'#ede5d4'},{n:'Forest Trust',bg:'#060c08',a:'#7ab88a',t:'#daf0e0'},{n:'Slate Bond',bg:'#0a0c10',a:'#8a9cb8',t:'#dce4f0'}],
  L:[{n:'Deep Rose',bg:'#120608',a:'#dc5064',t:'#f5e0e4'},{n:'Violet Kiss',bg:'#0e0610',a:'#c06ae0',t:'#f0e0f8'},{n:'Ember',bg:'#120804',a:'#e87040',t:'#f5e8dc'}],
  A:[{n:'Peach Glow',bg:'#100c0a',a:'#dca082',t:'#f5ece4'},{n:'Lavender',bg:'#0c0810',a:'#b898d0',t:'#ece4f4'},{n:'Blush',bg:'#100a0c',a:'#d48a9a',t:'#f5e4ea'}],
  M:[{n:'Royal Gold',bg:'#0c0a04',a:'#d4a853',t:'#f0e8d8'},{n:'Champagne',bg:'#0e0c06',a:'#c8b878',t:'#f0ecdc'},{n:'Platinum',bg:'#0a0a0e',a:'#a0a8c0',t:'#e8e8f0'}],
  E:[{n:'Electric Purple',bg:'#08060e',a:'#b478ff',t:'#e8e0f8'},{n:'Neon Charge',bg:'#060810',a:'#40b0ff',t:'#d8eaf8'},{n:'Blood Orange',bg:'#100604',a:'#e86030',t:'#f5e4d8'}],
  S:[{n:'Bright Gold',bg:'#0c0a06',a:'#dcb450',t:'#f0e8d4'},{n:'Teal Bond',bg:'#040c0c',a:'#40c8b0',t:'#d8f4ee'},{n:'Coral Fun',bg:'#100806',a:'#e08060',t:'#f5ece0'}]
};

let curR='M',curC={bg:'#0c0a04',accent:'#d4a853',text:'#f0e8d8'};

/* ═══ UTILS ═══ */
function h2r(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)}}
function ra(h,a){const{r,g,b}=h2r(h);return`rgba(${r},${g},${b},${a})`}
function dk(h,n){const{r,g,b}=h2r(h);return`rgb(${Math.max(0,r+n)},${Math.max(0,g+n)},${Math.max(0,b+n)})`}

let seed=1;
function sr(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646}
function resetS(){seed=curR.charCodeAt(0)*137+42}

/* ═══ TEXT WITH GLOW — solves visibility on all backgrounds ═══ */
function glowText(x,txt,px,py,font,color,glowColor,glowSize){
  x.save();
  x.font=font;
  x.textAlign='center';
  // Dark glow behind text for contrast
  x.shadowColor=glowColor;
  x.shadowBlur=glowSize;
  x.shadowOffsetX=0;x.shadowOffsetY=0;
  // Draw twice for stronger glow
  x.fillStyle=color;
  x.fillText(txt,px,py);
  x.fillText(txt,px,py);
  x.restore();
}

/* Pill shape without roundRect */
function pill(x,cx,cy,w,h,color){
  const r=h/2,left=cx-w/2,top=cy-h/2;
  x.fillStyle=color;
  x.beginPath();
  x.moveTo(left+r,top);
  x.lineTo(left+w-r,top);
  x.arc(left+w-r,top+r,r,-Math.PI/2,Math.PI/2);
  x.lineTo(left+r,top+h);
  x.arc(left+r,top+r,r,Math.PI/2,Math.PI*1.5);
  x.closePath();
  x.fill();
}

/* ═══ BACKGROUND: FRIENDS — Constellation web ═══ */
function bgFriends(x,acc){
  const nodes=[];
  for(let i=0;i<55;i++)nodes.push([sr()*W,sr()*H,0.8+sr()*2.5]);
  // Connecting lines
  x.lineWidth=0.6;
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const d=Math.hypot(nodes[j][0]-nodes[i][0],nodes[j][1]-nodes[i][1]);
      if(d<170){
        x.strokeStyle=ra(acc,0.06*(1-d/170));
        x.beginPath();x.moveTo(nodes[i][0],nodes[i][1]);x.lineTo(nodes[j][0],nodes[j][1]);x.stroke();
      }
    }
  }
  // Nodes
  nodes.forEach(([nx,ny,nr])=>{
    x.beginPath();x.arc(nx,ny,nr,0,Math.PI*2);
    x.fillStyle=ra(acc,0.1+sr()*0.22);x.fill();
  });
  // Anchor stars in corners
  [[110,90,3],[W-120,100,3],[130,H-110,2.5],[W-110,H-90,2.5]].forEach(([sx,sy,sr2])=>{
    x.beginPath();x.arc(sx,sy,sr2,0,Math.PI*2);x.fillStyle=ra(acc,0.3);x.fill();
  });
}

/* ═══ BACKGROUND: LOVERS — Particle pairs + heat haze ═══ */
function bgLovers(x,acc){
  // Heat shimmer bands
  for(let y=0;y<H;y+=2.5){
    const off=Math.sin(y*0.018+sr()*8)*3;
    x.fillStyle=ra(acc,0.003+sr()*0.005);
    x.fillRect(off,y,W,1.5);
  }
  // Particle pairs
  for(let i=0;i<30;i++){
    const cx=sr()*W,cy=sr()*H,ang=sr()*Math.PI*2,dist=6+sr()*16;
    const r=1+sr()*2.2,op=0.1+sr()*0.22;
    x.beginPath();x.arc(cx+Math.cos(ang)*dist,cy+Math.sin(ang)*dist,r,0,Math.PI*2);
    x.fillStyle=ra(acc,op);x.fill();
    x.beginPath();x.arc(cx-Math.cos(ang)*dist,cy-Math.sin(ang)*dist,r*0.75,0,Math.PI*2);
    x.fillStyle=ra(acc,op*0.65);x.fill();
    x.strokeStyle=ra(acc,op*0.18);x.lineWidth=0.3;
    x.beginPath();x.moveTo(cx+Math.cos(ang)*dist,cy+Math.sin(ang)*dist);
    x.lineTo(cx-Math.cos(ang)*dist,cy-Math.sin(ang)*dist);x.stroke();
  }
  echoT(x,RES.L.word,H/2+10,70,acc);
}

/* ═══ BACKGROUND: AFFECTION — Bokeh orbs ═══ */
function bgAffection(x,acc){
  for(let i=0;i<20;i++){
    const cx=sr()*W,cy=sr()*H,r=25+sr()*65;
    const g=x.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,ra(acc,0.035+sr()*0.045));
    g.addColorStop(0.5,ra(acc,0.012));
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fill();
  }
  for(let i=0;i<45;i++){
    x.beginPath();x.arc(sr()*W,sr()*H,0.4+sr()*1.2,0,Math.PI*2);
    x.fillStyle=ra(acc,0.08+sr()*0.15);x.fill();
  }
}

/* ═══ BACKGROUND: MARRIAGE — Sacred geometry + stars ═══ */
function bgMarriage(x,acc){
  const cx=W/2,cy=H/2,r=75;
  x.lineWidth=0.6;
  // Flower of life rings
  [{d:0,n:1,op:0.055},{d:r,n:6,op:0.04},{d:r*1.73,n:12,op:0.025},{d:r*2.6,n:18,op:0.014}].forEach(ring=>{
    x.strokeStyle=ra(acc,ring.op);
    if(ring.n===1){x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.stroke();return}
    for(let i=0;i<ring.n;i++){
      const a=i*Math.PI*2/ring.n+(ring.n===18?0.15:0);
      x.beginPath();x.arc(cx+ring.d*Math.cos(a),cy+ring.d*Math.sin(a),r,0,Math.PI*2);x.stroke();
    }
  });
  // Stars
  for(let i=0;i<75;i++){
    x.beginPath();x.arc(sr()*W,sr()*H,0.4+sr()*2,0,Math.PI*2);
    x.fillStyle=ra(acc,0.1+sr()*0.25);x.fill();
  }
  // Constellation lines
  const pts=[];for(let i=0;i<20;i++)pts.push([sr()*W,sr()*H]);
  x.strokeStyle=ra(acc,0.04);x.lineWidth=0.5;
  pts.forEach((p,i)=>{
    const n=pts.filter((_,j)=>j!==i).sort((a2,b2)=>Math.hypot(a2[0]-p[0],a2[1]-p[1])-Math.hypot(b2[0]-p[0],b2[1]-p[1]))[0];
    if(n&&Math.hypot(n[0]-p[0],n[1]-p[1])<200){x.beginPath();x.moveTo(p[0],p[1]);x.lineTo(n[0],n[1]);x.stroke()}
  });
}

/* ═══ BACKGROUND: TENSION — Lightning veins ═══ */
function bgTension(x,acc){
  function branch(sx,sy,ang,len,dep,maxD){
    if(dep>maxD||len<4)return;
    const ex=sx+Math.cos(ang)*len,ey=sy+Math.sin(ang)*len;
    x.strokeStyle=ra(acc,0.05+0.07*(1-dep/maxD));
    x.lineWidth=Math.max(0.3,1.5-dep*0.2);
    x.beginPath();x.moveTo(sx,sy);x.lineTo(ex,ey);x.stroke();
    branch(ex,ey,ang+(sr()-0.5)*0.9,len*(0.55+sr()*0.3),dep+1,maxD);
    if(sr()>0.35){
      const side=sr()>0.5?1:-1;
      branch(ex,ey,ang+side*(0.4+sr()*0.9),len*(0.35+sr()*0.25),dep+1,maxD);
    }
  }
  // 6 lightning origins from edges
  branch(sr()*250,0,Math.PI/2+(sr()-0.5)*0.5,35+sr()*30,0,7);
  branch(W-sr()*250,0,Math.PI/2+(sr()-0.5)*0.5,35+sr()*30,0,7);
  branch(sr()*W,H,-Math.PI/2+(sr()-0.5)*0.5,30+sr()*25,0,6);
  branch(0,150+sr()*400,sr()*0.5,30+sr()*25,0,6);
  branch(W,150+sr()*400,Math.PI+(sr()-0.5)*0.5,30+sr()*25,0,6);
  branch(W/2+sr()*200,0,Math.PI/2+sr()*0.3,25+sr()*20,0,5);
  // Spark crosses
  for(let i=0;i<45;i++){
    const sx=sr()*W,sy=sr()*H;
    x.fillStyle=ra(acc,0.12+sr()*0.25);
    x.fillRect(sx-0.5,sy-3,1,6);x.fillRect(sx-3,sy-0.5,6,1);
  }
  echoT(x,RES.E.word,H/2+10,70,acc);
}

/* ═══ BACKGROUND: BFFs — Confetti shapes ═══ */
function bgBFFs(x,acc){
  for(let i=0;i<130;i++){
    const sx=sr()*W,sy=sr()*H,op=0.06+sr()*0.2,sz=2+sr()*5.5,shape=sr();
    x.fillStyle=ra(acc,op);x.save();x.translate(sx,sy);x.rotate(sr()*Math.PI*2);
    if(shape<0.2){
      // Heart
      x.beginPath();x.moveTo(0,-sz*0.35);
      x.bezierCurveTo(sz*0.5,-sz,sz,0,0,sz*0.7);
      x.bezierCurveTo(-sz,0,-sz*0.5,-sz,0,-sz*0.35);x.fill();
    }else if(shape<0.4){
      // 4-point star
      x.beginPath();
      for(let j=0;j<8;j++){const a2=j*Math.PI/4,r2=j%2===0?sz:sz*0.35;j===0?x.moveTo(Math.cos(a2)*r2,Math.sin(a2)*r2):x.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2)}
      x.closePath();x.fill();
    }else if(shape<0.55){
      // Diamond
      x.rotate(Math.PI/4);x.fillRect(-sz/2,-sz/2,sz,sz);
    }else if(shape<0.75){
      // Circle
      x.beginPath();x.arc(0,0,sz/2,0,Math.PI*2);x.fill();
    }else if(shape<0.9){
      // Confetti strip
      x.fillRect(-sz*0.9,-1,sz*1.8,2);
    }else{
      // Triangle
      x.beginPath();x.moveTo(0,-sz);x.lineTo(sz*0.8,sz*0.6);x.lineTo(-sz*0.8,sz*0.6);x.closePath();x.fill();
    }
    x.restore();
  }
  for(let i=0;i<20;i++){
    x.beginPath();x.arc(sr()*W,sr()*H,1.5+sr()*2.5,0,Math.PI*2);
    x.fillStyle=ra(acc,0.15+sr()*0.2);x.fill();
  }
}

/* ═══ SHARED ═══ */
function echoT(x,txt,cy,bs,acc){
  x.save();x.textAlign='center';
  [{sz:bs*2.1,dy:-bs*1.1,op:0.02},{sz:bs*1.8,dy:-bs*.65,op:0.028},{sz:bs*1.5,dy:-bs*.3,op:0.035},{sz:bs*1.5,dy:bs*.95,op:0.028},{sz:bs*1.8,dy:bs*1.3,op:0.02}].forEach(l=>{
    x.fillStyle=ra(acc,l.op);x.font=`800 ${l.sz}px "Syne"`;x.fillText(txt,W/2,cy+l.dy);
  });
  x.restore();
}
function corners(x,acc){
  x.strokeStyle=ra(acc,0.3);x.lineWidth=1.5;const L=80;
  [[40,40+L,40,40,40+L,40],[W-40-L,40,W-40,40,W-40,40+L],[40,H-40-L,40,H-40,40+L,H-40],[W-40-L,H-40,W-40,H-40,W-40,H-40-L]].forEach(([x1,y1,x2,y2,x3,y3])=>{
    x.beginPath();x.moveTo(x1,y1);x.lineTo(x2,y2);x.lineTo(x3,y3);x.stroke();
  });
}
function diamond(x,cx,cy,sz,c){x.save();x.translate(cx,cy);x.rotate(Math.PI/4);x.fillStyle=c;x.fillRect(-sz/2,-sz/2,sz,sz);x.restore()}
function hLine(x,y,hw,c){x.strokeStyle=c;x.lineWidth=0.5;x.beginPath();x.moveTo(W/2-hw,y);x.lineTo(W/2+hw,y);x.stroke()}
function glow(x,cx,cy,r,acc,op){const g=x.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,ra(acc,op));g.addColorStop(1,'rgba(0,0,0,0)');x.fillStyle=g;x.fillRect(0,0,W,H)}

/* ═══ MAIN DRAW ═══ */
function draw(){
  const c=document.getElementById('card'),x=c.getContext('2d');
  const{bg,accent,text}=curC;
  const res=RES[curR];
  const n1=document.getElementById('name1').value||'Alex';
  const n2=document.getElementById('name2').value||'Jordan';

  resetS();

  // BG gradient
  const bgG=x.createLinearGradient(0,0,W,H);
  bgG.addColorStop(0,bg);bgG.addColorStop(0.5,dk(bg,8));bgG.addColorStop(1,bg);
  x.fillStyle=bgG;x.fillRect(0,0,W,H);

  // Result-specific background
  try{
    ({F:bgFriends,L:bgLovers,A:bgAffection,M:bgMarriage,E:bgTension,S:bgBFFs})[curR](x,accent);
  }catch(e){console.error('BG error:',e)}

  // Central glow
  glow(x,W/2,H/2-10,320,accent,0.07);
  if(curR==='M')glow(x,W/2,H/2-10,160,accent,0.04);

  // Frame
  corners(x,accent);

  // Marriage extra deco
  if(curR==='M'){
    x.strokeStyle=ra(accent,0.18);x.lineWidth=1;
    x.beginPath();x.moveTo(80,H/2);x.lineTo(W/2-260,H/2);x.stroke();
    x.beginPath();x.moveTo(W/2+260,H/2);x.lineTo(W-80,H/2);x.stroke();
    diamond(x,80,H/2,6,ra(accent,0.3));diamond(x,W-80,H/2,6,ra(accent,0.3));
    x.strokeStyle=ra(accent,0.1);x.lineWidth=0.5;
    x.beginPath();x.arc(W/2,40,110,0.15*Math.PI,0.85*Math.PI);x.stroke();
    for(let i=0;i<7;i++)diamond(x,W/2-90+i*30,H-72,i===3?6:4,ra(accent,i===3?0.35:0.12));
  }
  // Affection soft border
  if(curR==='A'){
    x.strokeStyle=ra(accent,0.12);x.lineWidth=0.5;
    x.strokeRect(35,35,W-70,H-70);x.strokeRect(42,42,W-84,H-84);
    [[48,48],[W-48,48],[48,H-48],[W-48,H-48]].forEach(([cx,cy])=>{x.beginPath();x.arc(cx,cy,3,0,Math.PI*2);x.fillStyle=ra(accent,0.25);x.fill()});
  }

  const isA=curR==='A';
  const glowBg=ra(bg,0.85);

  // ═══ HEADER — with dark glow for contrast ═══
  glowText(x,res.header.split('').join(' '),W/2,82,
    '700 14px "Quicksand"',ra(accent,0.85),glowBg,12);
  hLine(x,100,140,ra(accent,0.2));
  if(isA){x.beginPath();x.arc(W/2,100,3,0,Math.PI*2);x.fillStyle=ra(accent,0.4);x.fill()}
  else diamond(x,W/2,100,5,ra(accent,0.4));

  // ═══ EMOJI ═══
  x.save();x.shadowColor=ra(bg,0.7);x.shadowBlur=16;
  x.font='84px serif';x.textAlign='center';x.fillText(res.emoji,W/2,245);
  x.restore();

  // ═══ RESULT WORD — with glow ═══
  glowText(x,res.word,W/2,340,'800 70px "Syne"',accent,glowBg,18);
  hLine(x,367,110,ra(accent,0.22));
  if(isA){x.beginPath();x.arc(W/2,367,3,0,Math.PI*2);x.fillStyle=ra(accent,0.3);x.fill()}
  else diamond(x,W/2,367,5,ra(accent,0.35));

  // ═══ NAMES — with glow ═══
  glowText(x,`${n1}  ${res.nj}  ${n2}`,W/2,420,
    '600 28px "Quicksand"',ra(text,0.95),glowBg,14);

  // ═══ TAGLINE — with glow ═══
  glowText(x,res.tag,W/2,478,
    'italic 500 16px "Quicksand"',ra(accent,0.7),glowBg,10);

  // ═══ WATERMARK — pill bg + glow ═══
  const url=`Play yours → ${SITE}`;
  x.font='500 14px "Quicksand"';x.textAlign='center';
  const uw=x.measureText(url).width;
  pill(x,W/2,H-28,uw+36,26,ra(bg,0.7));
  glowText(x,url,W/2,H-23,'500 14px "Quicksand"',ra(accent,0.6),ra(bg,0.5),6);
}

/* ═══ UI ═══ */
function buildPre(){
  const c=document.getElementById('presets');c.innerHTML='';
  [...PRE._u,...(PRE[curR]||[])].forEach(p=>{
    const el=document.createElement('div');el.className='pr';el.title=p.n;
    el.innerHTML=`<div class="prh" style="background:${p.bg}"></div><div class="prh" style="background:${p.a}"></div>`;
    el.onclick=()=>{
      curC={bg:p.bg,accent:p.a,text:p.t};
      document.getElementById('cBg').value=p.bg;document.getElementById('cAcc').value=p.a;document.getElementById('cTxt').value=p.t;
      document.querySelectorAll('.pr').forEach(pr=>pr.classList.remove('on'));el.classList.add('on');draw();
    };
    c.appendChild(el);
  });
}
function pick(r){
  curR=r;document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('on',b.dataset.r===r));
  const f=(PRE[r]||PRE._u)[0];curC={bg:f.bg,accent:f.a,text:f.t};
  document.getElementById('cBg').value=f.bg;document.getElementById('cAcc').value=f.a;document.getElementById('cTxt').value=f.t;
  // Read URL params if present
const urlParams = new URLSearchParams(window.location.search);
const paramN1 = urlParams.get('n1');
const paramN2 = urlParams.get('n2');
const paramR = urlParams.get('r');
if(paramN1) document.getElementById('name1').value = paramN1;
if(paramN2) document.getElementById('name2').value = paramN2;
if(paramR && RES[paramR]) { curR = paramR; document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('on',b.dataset.r===paramR)); }
const initPreset = (PRE[curR]||PRE._u)[0];
curC = {bg:initPreset.bg, accent:initPreset.a, text:initPreset.t};
document.getElementById('cBg').value=initPreset.bg;
document.getElementById('cAcc').value=initPreset.a;
document.getElementById('cTxt').value=initPreset.t;
buildPre();draw();
}
function applyCustom(){
  curC={bg:document.getElementById('cBg').value,accent:document.getElementById('cAcc').value,text:document.getElementById('cTxt').value};
  document.querySelectorAll('.pr').forEach(p=>p.classList.remove('on'));draw();
}
function download(f='png'){
  const a=document.createElement('a'),n1=document.getElementById('name1').value||'Alex',n2=document.getElementById('name2').value||'Jordan';
  a.download=`flames-${n1}-${n2}-${RES[curR].word}.${f}`;
  a.href=f==='jpg'?document.getElementById('card').toDataURL('image/jpeg',0.95):document.getElementById('card').toDataURL('image/png');
  a.click();
}
document.getElementById('name1').addEventListener('input',draw);
document.getElementById('name2').addEventListener('input',draw);
// Read URL params if present
const urlParams = new URLSearchParams(window.location.search);
const paramN1 = urlParams.get('n1');
const paramN2 = urlParams.get('n2');
const paramR = urlParams.get('r');
if(paramN1) document.getElementById('name1').value = paramN1;
if(paramN2) document.getElementById('name2').value = paramN2;
if(paramR && RES[paramR]) { curR = paramR; document.querySelectorAll('.rb').forEach(b=>b.classList.toggle('on',b.dataset.r===paramR)); }
const initPreset = (PRE[curR]||PRE._u)[0];
curC = {bg:initPreset.bg, accent:initPreset.a, text:initPreset.t};
document.getElementById('cBg').value=initPreset.bg;
document.getElementById('cAcc').value=initPreset.a;
document.getElementById('cTxt').value=initPreset.t;
buildPre();draw();
</script>
